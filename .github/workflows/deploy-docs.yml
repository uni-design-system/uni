name: Deploy Documentation
on:
  push:
    branches: [main]
    paths:
      - 'packages/react/**'
      - 'packages/angular/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build All Packages
        run: pnpm turbo run build

      - name: Build Storybooks
        run: |
          pnpm --filter @uni-design-system/uni-react build-storybook
          cd packages/angular && npx ng run @uni-design-system/uni-angular:build-storybook

      - name: Deploy React Docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: packages/react/storybook-static
          target-folder: docs/react

      - name: Deploy Angular Docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: packages/angular/storybook-static
          target-folder: docs/angular
