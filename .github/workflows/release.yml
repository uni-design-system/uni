name: Release & Version
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build, Version, and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write # To create the Version PR and Git Tags
      pull-requests: write # To open the Version PR
      id-token: write # REQUIRED for Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run build

      - name: Create Release PR or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          # version-packages also rebuilds the MCP index (needs the bumped
          # versions + a built storybook), so the refreshed uni-index.json is
          # committed into the Version PR. Publish then just bundles it —
          # `mcp build` never regenerates the index.
          version: pnpm run version-packages
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
