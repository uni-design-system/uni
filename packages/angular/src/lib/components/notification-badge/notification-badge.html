<ng-content></ng-content>
@if (shouldShow()) {
<div class="notification-badge-indicator" aria-hidden="true">
  <uni-text
    typeface="overline"
    align="center"
    [style.max-width]="badgeVariant() !== 'pill' ? (displayValue().length * 5 + 'px') : ''"
    >{{ displayValue() }}</uni-text
  >
</div>
<span [class]="srOnlyClass">{{ announcement() }}</span>
}
