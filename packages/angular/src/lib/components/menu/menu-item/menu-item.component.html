@let tpl = template();
@let symbol = symbolName();
@if (symbol) {
  <Symbol [name]="symbol"></Symbol>
}
<div box-layout [grow]="1">
  @if (tpl) {
    <ng-container [ngTemplateOutlet]="tpl" [ngTemplateOutletContext]="context()"></ng-container>
  } @else {
    <Text role="label" display="block" [nowrap]="true">
      {{ label() }}
    </Text>
  }
</div>
@if (active()) {
  <Symbol name="check"></Symbol>
}
