<svg
  viewBox="0 0 36 36"
  class="circular-chart"
  aria-hidden="true"
  [style.height]="style()['height']"
>
  <path
    class="circle-bg"
    [attr.stroke]="style()['backgroundColor']"
    d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831"
  />
  <path
    class="circle"
    [attr.stroke]="style()['color']"
    [attr.stroke-dasharray]="percent() + ', 100'"
    d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831"
  />
  <text x="18.5" y="20.82" class="percentage" [style.fill]="textStyle()">
    {{ percent() }}%
  </text>
</svg>
