<div box-layout color="primary" borderRadius="max" display="inline-block">
  <div row-layout paddingLeft="sm" gap="xs">
    <Text display="block" typeface="tag">{{ label() }}</Text>
    <button icon-button symbolName="close" size="sm" (click)="handleClose()">
      Remove {{ label() }}
    </button>
  </div>
</div>
