<!-- Click bubbles up from the projected [trigger] content, which is expected
     to be focusable (a button); keyboard activation arrives as a click. -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<span #trigger (click)="togglePopover($event)">
  <ng-content select="[trigger]"></ng-content>
</span>
<div uniBodyRender #popover [class]="popoverClassName">
  <ng-content></ng-content>
  <div #arrow [class]="arrowClassName"></div>
</div>
