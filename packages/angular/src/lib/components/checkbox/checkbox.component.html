<label [class]="checkboxLabel()">
  <input
    type="checkbox"
    [class]="checkboxInput()"
    [checked]="checked()"
    [indeterminate]="indeterminate()"
    (change)="handleChange($event)"
    [disabled]="disabled()"
    [attr.aria-invalid]="showError() ? true : null"
    [attr.aria-required]="required() ? true : null"
    [attr.aria-describedby]="ariaDescribedBy() || null"
  />
  <div class="checkbox">
    <svg viewBox="0 0 20 20" aria-hidden="true">
      <rect class="checkbox-box" x="1" y="1" width="18" height="18"></rect>
      <polyline class="checkbox-check" points="4 11 8 15 16 6"></polyline>
      <line class="checkbox-dash" x1="5" y1="10" x2="15" y2="10"></line>
    </svg>
  </div>
  @if (label()) {
    <Text typeface="label">{{ label() }}</Text>
  }
</label>
