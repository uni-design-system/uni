<label [class]="checkboxLabel">
  <input
    type="checkbox"
    [class]="checkboxInput"
    [checked]="checked()"
    (change)="checked.set($any($event.target).checked); markAsTouched()"
    [disabled]="disabled()"
  />
  <div class="checkbox">
    <svg viewBox="0 0 20 20">
      <rect class="checkbox-box" x="1" y="1" width="18" height="18"></rect>
      <polyline class="checkbox-check" points="4 11 8 15 16 6"></polyline>
    </svg>
  </div>
  @if (label()) {
    <Text typeface="label">{{ label() }}</Text>
  }
</label>
