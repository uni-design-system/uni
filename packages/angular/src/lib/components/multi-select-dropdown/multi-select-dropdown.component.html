<button
  [class]="triggerClass"
  #trigger
  [style.cursor]="disabled() ? 'default' : 'pointer'"
  [attr.aria-required]="required() ? true : null"
  [attr.aria-invalid]="showError() ? true : null"
  [attr.aria-describedby]="ariaDescribedBy() || null"
  (click)="!disabled() && touched.set(true)"
>
  <uni-input-box [error]="showError()" [disabled]="disabled()">
    <div
      row-layout
      alignItems="center"
      justifyContent="space-between"
      [fullWidth]="true"
      [minWidth]="0"
      paddingLeft="sm"
    >
      <Text
        display="block"
        [typeface]="componentOptions().textRole"
        [color]="textColor()"
        [ellipsis]="true"
        [style.flex-grow]="1"
        >{{ selectedLabelsText() }}</Text
      >
      <Symbol name="keyboard_arrow_down" [style.flex-shrink]="0"></Symbol>
    </div>
  </uni-input-box>
</button>
<uni-dropdown
  #dropdown
  [trigger]="trigger"
  ariaHasPopup="dialog"
  (dropdownShowing)="$event && searchInput.focus()"
  (dropdownHiding)="$event && trigger.focus()"
>
  <div box-layout gap="xs" padding="xs">
    <input
      #searchInput
      type="text"
      [class]="searchInputClass()"
      [value]="query()"
      (input)="handleQueryInput($event)"
      placeholder="Search..."
      aria-label="Filter options"
      (click)="$event.stopPropagation()"
      [disabled]="disabled()"
    />
  </div>

  <uni-divider [border]="componentOptions().dividerBorder" />

  <div stack-layout gap="xs" padding="xs">
    @for (option of filteredOptions(); track option.value) {
      <uni-checkbox
        [label]="option.label"
        [checked]="isOptionSelected(option)()"
        (checkedChange)="toggleOption(option, $event)"
        variant="primary"
        [disabled]="disabled()"
      >
      </uni-checkbox>
    }
  </div>

  <uni-divider [border]="componentOptions().dividerBorder" />

  <div row-layout gap="xs" justifyContent="space-around" padding="xs">
    <button text-button (click)="dropdown.hideDropdown()" size="sm" variant="ghost">Done</button>
  </div>
</uni-dropdown>
