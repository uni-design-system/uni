<div
  [class]="radioGroupClass"
  role="radiogroup"
  [attr.aria-labelledby]="label() ? groupLabelId : null"
  [attr.aria-invalid]="showError() ? true : null"
>
  @if (label()) {
    <Text typeface="label" [attr.id]="groupLabelId">{{ label() }}</Text>
  }

  @for (option of options(); track option.value) {
    <label
      [class]="radioOptionClass"
      [class.disabled]="disabled() || option.disabled"
    >
      <input
        type="radio"
        [class]="radioInputClass"
        [value]="option.value"
        [name]="name()"
        [checked]="value() === option.value"
        [disabled]="disabled() || option.disabled"
        (change)="handleRadioChange(option.value)"
      />
      <div class="radio-button">
        <div class="radio-inner"></div>
      </div>
      <Text typeface="label">{{ option.label }}</Text>
    </label>
  }
</div>
