name: Bug report
description: Something doesn't work as documented
labels: [bug]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@uni-design-system/uni-angular'
        - '@uni-design-system/uni-react'
        - '@uni-design-system/uni-core'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '3.0.2'
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code snippet or StackBlitz. Use the canonical selectors from llms.txt.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
